version: "3.9"

x-service-templates:
  nestjs-api: &nestjs-api
    build: .
    restart: always
    networks:
      - rinha-network
    environment:
      - PORT=3000
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    networks:
      - rinha-network
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "50MB"

  api1:
    <<: *nestjs-api
    container_name: api1
    hostname: api1

  api2:
    <<: *nestjs-api
    container_name: api2
    hostname: api2

networks:
  rinha-network:
    name: rinha-network
    driver: bridge
