events {
    worker_connections 8192;
}

http {
    access_log off;
    sendfile   on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 10000;

    upstream api {
        server api1:3000;
        server api2:3000;
        keepalive 128;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
